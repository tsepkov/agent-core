# Local development stack — source-only, no build step.
#
#   1. pnpm install                    # once, on the host
#   2. cp .env.example .env            # add your OPENROUTER_API_KEY
#   3. docker compose up
#
# Open http://localhost:3000 for the chat UI (hot-reloads on every file save).
# The Restate admin UI is at http://localhost:9070.
#
# The agent is decoupled from the HTTP connection. You can also test it directly:
#
# Submit a message (one-way, returns immediately):
#   curl http://localhost:8080/Manager/session-1/chat/send \
#     -H 'content-type: application/json' -H 'idempotency-key: s1-turn-1' \
#     -d '{"message":"Привет, кто ты?","replyTo":{"channel":"web","address":"session-1"}}'
#
# Pull the reply (cursor advances as you consume messages):
#   curl http://localhost:8080/Manager/session-1/pull \
#     -H 'content-type: application/json' -d '{"cursor":0}'

services:
  # Restate runtime: durable execution, ingress (8080) and admin (9070).
  restate:
    image: restatedev/restate:1.7
    environment:
      RESTATE_INGRESS__BIND_ADDRESS: "0.0.0.0:8080"
      RESTATE_ADMIN__BIND_ADDRESS: "0.0.0.0:9070"
      RESTATE_BIND_ADDRESS: "0.0.0.0:5122"
    ports:
      - "8080:8080"
      - "9070:9070"
    volumes:
      - restate-data:/restate-data

  # Development app server: Next.js (web UI + Restate endpoint at /restate).
  # No build step — edits reflect immediately via HMR.
  # node_modules are bind-mounted from the host (installed once with npm install).
  app:
    image: node:22-slim
    working_dir: /app/apps/demo-next
    command: >-
      /app/apps/demo-next/node_modules/.bin/next dev --turbopack -H 0.0.0.0
    environment:
      NODE_ENV: development
      NODE_OPTIONS: "--inspect=0.0.0.0:9229"
      RESTATE_INGRESS_URL: "http://restate:8080"
    env_file: .env
    volumes:
      - ./:/app
    ports:
      - "3000:3000"
      - "9229:9229"
      - "9230:9230"
    depends_on:
      - restate

  # One-shot: wait for Next.js /restate endpoint to be ready, then register with HTTP/1.1.
  register:
    image: curlimages/curl:8.10.1
    depends_on:
      - restate
      - app
    restart: "no"
    entrypoint:
      - sh
      - -c
      - |
        echo "waiting for Next.js Restate endpoint on app:3000 ...";
        until curl -sf http://app:3000/restate/discover \
          -H 'accept: application/vnd.restate.endpointmanifest.v3+json' > /dev/null 2>&1; do sleep 2; done;
        echo "agent ready — registering deployment with Restate ...";
        until curl -sf -X POST http://restate:9070/deployments \
          -H 'content-type: application/json' \
          -d '{"uri":"http://app:3000/restate","use_http_11":true,"force":true}'; do sleep 2; done;
        echo "registered.";

volumes:
  restate-data:
